<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Stock Volatility Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="../css/style.css">

<script>
/* Dashboard protection */
if(!localStorage.getItem("user")){
window.location.href="login.html"
}
</script>

</head>

<body>

<!-- Navbar -->

<div class="navbar">

<h2>📊 Stock Dashboard</h2>

<div class="nav-right">

<span id="username"></span>

<button onclick="logout()" class="logout-btn">Logout</button>

</div>

</div>


<h1>Stock Market Volatility & Trend Analysis</h1>

<!-- Controls -->

<div class="controls smooth-card">

<div class="autocomplete-container">

<label>Select the ticker:</label>

<input type="text" id="tickerInput" placeholder="Enter stock ticker (INFY)">

<div id="suggestions" class="suggestions-box"></div>

</div>

<label>Select Data Points:</label>

<select id="limit">

<option value="30">Last 30 days</option>

<option value="100" selected>Last 100 days</option>

<option value="250">Last 1 Year</option>

</select>

<button onclick="analyzeStock()">Analyze</button>

</div>


<!-- Results -->

<div class="results smooth-card">

<h2>Analysis Results</h2>

<div id="analysisResults">

Select parameters and click Analyze

</div>

<button onclick="downloadPDF()" class="pdf-btn">
Download Report (PDF)
</button>

</div>


<!-- Charts -->

<div class="chart-container smooth-card">

<h2>Stock Price & Moving Averages</h2>

<canvas id="priceChart"></canvas>

</div>


<div class="chart-container smooth-card">

<h2>Volatility Analysis</h2>

<canvas id="volatilityChart"></canvas>

</div>


<script src="../js/charts.js"></script>
<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>

<script>

/* show username */

let user = JSON.parse(localStorage.getItem("user"));

if(user){
document.getElementById("username").innerText = "👤 " + user.name;
}

</script>

</body>
</html>
