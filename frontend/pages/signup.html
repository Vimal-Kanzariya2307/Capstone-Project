<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>

<style>

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#121417;
font-family:'Inter',system-ui;
margin:0;
}

/* Card */

.signup-box{

background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:2.5rem;
border-radius:30px;
width:340px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 40px rgba(0,0,0,0.4);

}

/* Title */

.signup-box h2{
color:white;
text-align:center;
margin-bottom:25px;
}

/* Inputs */

.form-group{
margin-bottom:15px;
}

.form-group label{
display:block;
color:#aaa;
font-size:0.85rem;
margin-bottom:5px;
}

.form-group input{

width:100%;
padding:14px 18px;
background:rgba(255,255,255,0.07);
border:1px solid transparent;
border-radius:15px;
color:white;
outline:none;
transition:0.3s;

}

.form-group input:focus{
border-color:#d4a373;
background:rgba(255,255,255,0.12);
}

/* Button */

.signup-btn{

width:100%;
padding:15px;
background:linear-gradient(135deg,#bf953f,#fcf6ba,#b38728,#fcf6ba,#aa771c);
border:none;
border-radius:15px;
font-weight:600;
color:#121417;
cursor:pointer;
margin-top:10px;
transition:0.3s;

}

.signup-btn:hover{

transform:scale(1.03);

}

/* Link */

.login-link{

text-align:center;
margin-top:15px;
color:#aaa;
font-size:0.9rem;

}

.login-link a{

color:#fcf6ba;
text-decoration:none;

}

</style>

</head>

<body>

<div class="signup-box">

<h2>Create Account</h2>

<div class="form-group">
<label>Name</label>
<input type="text" id="name" placeholder="Your name">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" placeholder="Your email">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" placeholder="Password">
</div>

<button class="signup-btn" onclick="signup()">Signup</button>

<div class="login-link">
Already have account? <a href="login.html">Login</a>
</div>

</div>

<script src="../js/auth.js"></script>

</body>

</html>
